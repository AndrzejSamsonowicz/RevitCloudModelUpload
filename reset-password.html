<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Revit Cloud Model Publisher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Artifact+Elements:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Artifact Elements', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .reset-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #6c757d;
            font-size: 14px;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: 'Artifact Elements', Arial, sans-serif;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .password-requirements {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Artifact Elements', Arial, sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .loading-container {
            text-align: center;
            padding: 40px 20px;
        }
        
        .spinner-large {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">
            <h1>🔒 Reset Password</h1>
            <p>Enter your new password</p>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <div id="loadingState" class="loading-container" style="display: none;">
            <div class="spinner-large"></div>
            <p style="color: #6c757d;">Verifying reset link...</p>
        </div>
        
        <form id="resetPasswordForm" style="display: none;">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required placeholder="Enter new password">
                <div class="password-requirements">
                    Password must be at least 6 characters long
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm new password">
            </div>
            
            <button type="submit" class="btn btn-primary" id="resetBtn">
                Reset Password
            </button>
        </form>
        
        <div class="back-link">
            <a href="/login">← Back to Login</a>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    
    <script>
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        let oobCode = null;
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type} show`;
            alertBox.textContent = message;
        }
        
        // Get the action code from URL
        async function verifyResetCode() {
            const urlParams = new URLSearchParams(window.location.search);
            oobCode = urlParams.get('oobCode');
            const mode = urlParams.get('mode');
            
            if (!oobCode || mode !== 'resetPassword') {
                showAlert('Invalid or expired reset link. Please request a new password reset.', 'error');
                return;
            }
            
            document.getElementById('loadingState').style.display = 'block';
            
            try {
                // Verify the password reset code
                await auth.verifyPasswordResetCode(oobCode);
                
                // Code is valid, show the form
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('resetPasswordForm').style.display = 'block';
                
            } catch (error) {
                console.error('Verify code error:', error);
                document.getElementById('loadingState').style.display = 'none';
                
                let errorMessage = 'Invalid or expired reset link.';
                switch (error.code) {
                    case 'auth/expired-action-code':
                        errorMessage = 'This reset link has expired. Please request a new one.';
                        break;
                    case 'auth/invalid-action-code':
                        errorMessage = 'This reset link is invalid or has already been used.';
                        break;
                }
                
                showAlert(errorMessage, 'error');
            }
        }
        
        // Handle form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match.', 'error');
                return;
            }
            
            // Validate password length
            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long.', 'error');
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = 'Resetting... <span class="loading-spinner"></span>';
            
            try {
                // Reset the password
                await auth.confirmPasswordReset(oobCode, newPassword);
                
                showAlert('Password reset successfully! Redirecting to login...', 'success');
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
                
            } catch (error) {
                console.error('Password reset error:', error);
                
                let errorMessage = 'Failed to reset password. Please try again.';
                switch (error.code) {
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Please use a stronger password.';
                        break;
                    case 'auth/expired-action-code':
                        errorMessage = 'This reset link has expired. Please request a new one.';
                        break;
                    case 'auth/invalid-action-code':
                        errorMessage = 'This reset link is invalid or has already been used.';
                        break;
                }
                
                showAlert(errorMessage, 'error');
                
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });
        
        // Verify the code when page loads
        verifyResetCode();
    </script>
</body>
</html>
